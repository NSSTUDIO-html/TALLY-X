<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tally Prime Lite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Tally Prime Lite</h1>
    
    <div class="company-section">
      <input type="text" id="companyName" placeholder="Enter Company Name" />
      <button onclick="createCompany()">Create Company</button>
    </div>

    <h2 id="companyHeader"></h2>

    <div class="entry-form">
      <input type="date" id="entryDate" />
      <input type="text" id="particulars" placeholder="Particulars" />
      <input type="number" id="debit" placeholder="Debit" />
      <input type="number" id="credit" placeholder="Credit" />
      <button onclick="addEntry()">Add Entry</button>
    </div>

    <table id="ledgerTable">
      <thead>
  <tr>
    <th>Date</th>
    <th>Particulars</th>
    <th>Debit</th>
    <th>Credit</th>
    <th>Action</th>
  </tr>
</thead>
      <tbody>
      </tbody>
    </table>

    <div class="totals">
      <p>Total Debit: <span id="totalDebit">0</span></p>
      <p>Total Credit: <span id="totalCredit">0</span></p>
    </div>
  </div>
<div class="buttons" style="text-align: center; margin-top: 20px;">
  <button onclick="exportCSV()">Export to CSV</button>
</div>
  <script>

    let entries = [];

// Load data on page load
window.onload = () => {
  loadData();
};

// Create company
function createCompany() {
  const name = document.getElementById("companyName").value.trim();
  if (name) {
    document.getElementById("companyHeader").textContent = name;
    document.getElementById("companyName").value = "";
  }
}

// Add new entry
function addEntry() {
  const date = document.getElementById("entryDate").value;
  const particulars = document.getElementById("particulars").value.trim();
  const debit = parseFloat(document.getElementById("debit").value) || 0;
  const credit = parseFloat(document.getElementById("credit").value) || 0;

  if (!date || !particulars || (debit === 0 && credit === 0)) {
    alert("Please fill all required fields correctly.");
    return;
  }

  entries.push({ date, particulars, debit, credit });
  saveData();
  renderTable();
  clearInputs();
}

// Clear input fields
function clearInputs() {
  document.getElementById("entryDate").value = "";
  document.getElementById("particulars").value = "";
  document.getElementById("debit").value = "";
  document.getElementById("credit").value = "";
}

// Render ledger table
function renderTable() {
  const tableBody = document.querySelector("#ledgerTable tbody");
  tableBody.innerHTML = "";

  let totalDebit = 0;
  let totalCredit = 0;

  entries.forEach((entry, index) => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${entry.date}</td>
      <td>${entry.particulars}</td>
      <td>${entry.debit.toFixed(2)}</td>
      <td>${entry.credit.toFixed(2)}</td>
      <td><button onclick="deleteEntry(${index})">Delete</button></td>
    `;
    totalDebit += entry.debit;
    totalCredit += entry.credit;
    tableBody.appendChild(row);
  });

  document.getElementById("totalDebit").textContent = totalDebit.toFixed(2);
  document.getElementById("totalCredit").textContent = totalCredit.toFixed(2);
}

// Delete entry by index
function deleteEntry(index) {
  if (confirm("Delete this entry?")) {
    entries.splice(index, 1);
    saveData();
    renderTable();
  }
}

// Save to localStorage
function saveData() {
  localStorage.setItem("ledgerEntries", JSON.stringify(entries));
}

// Load from localStorage
function loadData() {
  const data = localStorage.getItem("ledgerEntries");
  if (data) {
    entries = JSON.parse(data);
    renderTable();
  }
}

// Export to CSV
function exportCSV() {
  if (entries.length === 0) {
    alert("No data to export!");
    return;
  }

  let csv = "Date,Particulars,Debit,Credit\n";
  entries.forEach(entry => {
    csv += `${entry.date},${entry.particulars},${entry.debit},${entry.credit}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "ledger.csv";
  link.click();
}
  </script>
</body>
</html>
